<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Garde Method — Mi Entrenamiento</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080808;color:#f0f0f0;font-family:'Barlow',sans-serif;-webkit-font-smoothing:antialiased}
.page{display:none;max-width:430px;margin:0 auto;min-height:100vh;flex-direction:column}
.page.active{display:flex}
.login-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px}
.login-logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:34px;letter-spacing:5px;text-transform:uppercase;margin-bottom:6px}
.login-logo span{color:#FF4D00}
.login-sub{font-size:12px;color:#555;margin-bottom:40px;letter-spacing:2px;text-transform:uppercase}
.login-card{width:100%;background:#111;border-radius:16px;padding:28px 20px;border:1px solid #1e1e1e}
.login-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;text-transform:uppercase;letter-spacing:2px;margin-bottom:20px}
.flbl{font-size:10px;color:#555;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px;display:block}
.inp{width:100%;background:#1a1a1a;border:1px solid #1e1e1e;border-radius:10px;padding:13px 14px;color:#f0f0f0;font-family:'Barlow',sans-serif;font-size:14px;outline:none;margin-bottom:12px;-webkit-appearance:none}
.inp:focus{border-color:#FF4D00}
.err{font-size:12px;color:#FF4D00;margin-bottom:10px;text-align:center;min-height:18px}
.btn-fire{width:100%;padding:15px;border-radius:12px;border:none;background:#FF4D00;color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;letter-spacing:2px;text-transform:uppercase;cursor:pointer}
.hdr{padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #1e1e1e;background:linear-gradient(180deg,rgba(255,77,0,.06) 0%,transparent 100%)}
.logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;letter-spacing:4px;text-transform:uppercase}
.logo span{color:#FF4D00}
.role-tag{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:2px;padding:5px 12px;background:#00E676;color:#080808;text-transform:uppercase;border-radius:2px;cursor:pointer;border:none}
.scroll{flex:1;overflow-y:auto;padding:18px 20px 90px}
.nav{display:flex;background:#111;border-top:1px solid #1e1e1e;padding:8px 0 6px;position:sticky;bottom:0}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:transparent;color:#444;cursor:pointer;padding:6px;font-family:'Barlow',sans-serif}
.nb.on{color:#FF4D00}
.nb svg{width:20px;height:20px}
.nb span{font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase}
.hero{background:#111;border-radius:14px;padding:18px;margin-bottom:16px;border:1px solid #1e1e1e;display:flex;align-items:center;gap:14px}
.hero-av{width:56px;height:56px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:18px;color:#fff;flex-shrink:0}
.hero-name{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;text-transform:uppercase;line-height:1}
.hero-sub{font-size:12px;color:#555;margin-top:3px}
.day-strip{display:flex;gap:8px;overflow-x:auto;margin-bottom:16px;padding-bottom:2px;scrollbar-width:none}
.day-strip::-webkit-scrollbar{display:none}
.day-btn{flex-shrink:0;padding:9px 16px;border-radius:8px;border:1px solid #1e1e1e;background:#111;color:#555;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;-webkit-tap-highlight-color:transparent}
.day-btn.active{background:#FF4D00;border-color:#FF4D00;color:#fff}
.wh{background:#111;border-radius:14px;padding:16px;margin-bottom:12px;border:1px solid #1e1e1e;border-left:3px solid #FF4D00}
.wh-day{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:9px;letter-spacing:2px;color:#FF4D00;text-transform:uppercase;margin-bottom:3px}
.wh-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;text-transform:uppercase;margin-bottom:8px}
.muscle-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.mtag{font-size:11px;font-weight:600;padding:3px 9px;border-radius:3px;background:#1a1a1a;color:#555;border:1px solid #1e1e1e}
.prog-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.prog-lbl{font-size:12px;color:#555}
.prog-num{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:15px;color:#FF4D00}
.prog-num.done{color:#00E676}
.pbar{height:3px;background:#1e1e1e;border-radius:2px;overflow:hidden}
.pfill{height:100%;background:#FF4D00;border-radius:2px;transition:width .4s}
.pfill.done{background:#00E676}
.ec{background:#111;border-radius:12px;padding:14px;margin-bottom:8px;border:1px solid #1e1e1e;cursor:pointer;display:flex;align-items:center;gap:12px;-webkit-tap-highlight-color:transparent;transition:opacity .2s}
.ec.done{opacity:.5}
.ss-group{background:#111;border-radius:12px;margin-bottom:8px;border:1px solid #1e1e1e;border-left:4px solid #FF4D00;overflow:hidden;transition:opacity .2s}
.ss-group.done{opacity:.5}
.ss-header{padding:10px 14px 8px;background:rgba(255,77,0,0.06);border-bottom:1px solid #1e1e1e}
.ss-tag{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:11px;letter-spacing:2px;color:#FF4D00;text-transform:uppercase}
.ss-hint{font-size:10px;color:#666;margin-top:2px}
.ss-item{padding:12px 14px;border-bottom:1px dashed #1e1e1e}
.ss-item:last-of-type{border-bottom:none}
.ss-item-head{display:flex;align-items:flex-start;gap:10px}
.ss-num{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:15px;color:#FF4D00;min-width:24px;flex-shrink:0;margin-top:2px}
.ss-name{font-size:14px;font-weight:500}
.ss-name.done{text-decoration:line-through;color:#555}
.ss-det{font-size:11px;color:#666;margin-top:2px}
.ss-note{font-size:11px;color:#888;font-style:italic;margin-top:3px}
.ss-badge{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:17px;color:#FF4D00;flex-shrink:0}
.ss-weight-row{display:flex;align-items:center;gap:8px;margin-top:8px;padding-top:8px;border-top:1px solid #1a1a1a}
.ss-footer{padding:12px 14px;background:#0a0a0a;display:flex;align-items:center;gap:12px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.ss-rest{font-size:11px;color:#666;margin-left:auto;flex-shrink:0}
.ss-complete-lbl{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;letter-spacing:1px;text-transform:uppercase;color:#f0f0f0}
.ss-complete-lbl.done{color:#555;text-decoration:line-through}
.chk{width:26px;height:26px;border-radius:8px;border:2px solid #2a2a2a;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.chk.done{background:#00E676;border-color:#00E676}
.ec-name{font-size:14px;font-weight:500;transition:all .2s}
.ec-name.done{text-decoration:line-through;color:#555}
.ec-det{font-size:11px;color:#555;margin-top:2px}
.ec-note{font-size:11px;color:#FF9800;margin-top:2px}
.ec-badge{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:19px;color:#FF4D00;flex-shrink:0;text-align:right;transition:color .2s}
.ec-badge.done{color:#00E676}
.ec-rest{font-size:10px;color:#555;text-align:right;margin-top:1px}
.done-banner{background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.25);border-radius:12px;padding:16px;text-align:center;margin-bottom:14px}
.done-icon{font-size:30px;margin-bottom:5px}
.done-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:18px;letter-spacing:1px;color:#00E676;text-transform:uppercase}
.done-sub{font-size:12px;color:#555;margin-top:3px}
.mg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.mc{background:#111;border-radius:12px;padding:14px 8px;text-align:center;border:1px solid #1e1e1e;transition:all .2s}
.mc.active{border-color:#FF4D00;background:rgba(255,77,0,.08)}
.mc-ico{font-size:22px;margin-bottom:5px}
.mc-lbl{font-size:10px;color:#555;font-weight:600;letter-spacing:.5px}
.mc.active .mc-lbl{color:#ccc}
.wcard{background:#111;border-radius:12px;padding:14px;margin-bottom:8px;border:1px solid #1e1e1e}
.wd{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:9px;letter-spacing:2px;color:#FF4D00;text-transform:uppercase;margin-bottom:3px}
.wt{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;text-transform:uppercase;margin-bottom:7px}
.wcount{font-size:11px;color:#555;margin-top:5px}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:2px;border-radius:14px;overflow:hidden;margin-bottom:14px}
.scell{background:#111;padding:18px}
.snum{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:38px;line-height:1}
.slbl{font-size:11px;color:#555;margin-top:3px}
.chart-box{background:#1a1a1a;border-radius:12px;padding:14px;margin-bottom:14px}
.chart-lbl{font-size:10px;color:#555;letter-spacing:1px;text-transform:uppercase;font-weight:600;margin-bottom:12px}
.chart-bars{display:flex;align-items:flex-end;gap:5px;height:60px}
.cbw{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.cb{width:100%;background:#2a2a2a;border-radius:2px 2px 0 0;min-height:3px}
.cb.last{background:#FF4D00}
.cbl{font-size:9px;color:#555}
.hist-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #1e1e1e}
.hist-row:last-child{border-bottom:none}
.hdate{font-size:12px;color:#555}
.hnote{font-size:10px;color:#333;margin-top:1px}
.hw{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:20px}
.slbl2{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#555;margin-bottom:12px}
.divider{height:1px;background:#1e1e1e;margin:16px 0}
.empty{text-align:center;padding:40px 20px;color:#444}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.6}
.loading{text-align:center;padding:60px 20px;color:#555;font-size:14px}
.timer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:500;flex-direction:column;align-items:center;justify-content:center;padding:30px;transition:background .3s}
.timer-overlay.show{display:flex}
.timer-overlay.work{background:rgba(0,40,10,.97)}
.timer-overlay.rest{background:rgba(50,0,0,.97)}
.timer-label{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:3px;text-transform:uppercase;color:#555;margin-bottom:16px}
.timer-circle{width:200px;height:200px;border-radius:50%;border:4px solid #1e1e1e;display:flex;align-items:center;justify-content:center;position:relative;margin-bottom:24px;transition:all .3s}
.timer-circle.work{border-color:#00E676;background:rgba(0,230,118,0.15);box-shadow:0 0 40px rgba(0,230,118,0.4)}
.timer-circle.rest{border-color:#FF1744;background:rgba(255,23,68,0.15);box-shadow:0 0 40px rgba(255,23,68,0.4)}
.timer-circle.warn{animation:pulseWarn .5s ease-in-out infinite}
@keyframes pulseWarn{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.timer-num{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:72px;color:#f0f0f0;line-height:1}
.timer-sec{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:20px;color:#555}
.timer-ex{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:18px;text-transform:uppercase;color:#f0f0f0;margin-bottom:8px;text-align:center}
.timer-next{font-size:12px;color:#555;margin-bottom:32px;text-align:center}
.timer-skip{background:#1a1a1a;border:1px solid #1e1e1e;color:#555;border-radius:12px;padding:14px 32px;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:14px;letter-spacing:2px;text-transform:uppercase;cursor:pointer}
.achievement-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:600;align-items:center;justify-content:center;flex-direction:column;padding:30px}
.achievement-overlay.show{display:flex}
.achievement-box{background:#111;border-radius:24px;padding:32px 24px;text-align:center;border:1px solid #1e1e1e;max-width:340px;width:100%;position:relative}
.achievement-glow{position:absolute;inset:0;border-radius:24px;border:2px solid #FF4D00;opacity:.6;animation:glow 2s ease-in-out infinite}
@keyframes glow{0%,100%{opacity:.3}50%{opacity:.8}}
.achievement-emoji{font-size:60px;margin-bottom:12px;display:block}
.achievement-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:28px;text-transform:uppercase;letter-spacing:2px;color:#FF4D00;margin-bottom:8px}
.achievement-msg{font-size:14px;color:#aaa;line-height:1.5;margin-bottom:24px}
.achievement-btn{background:#FF4D00;border:none;color:#fff;border-radius:12px;padding:14px 32px;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;width:100%}
/* ===== NUTRICIÓN ===== */
.tip-card{background:linear-gradient(135deg,rgba(255,77,0,.12),rgba(255,77,0,.03));border:1px solid rgba(255,77,0,.25);border-left:3px solid #FF4D00;border-radius:14px;padding:16px;margin-bottom:18px}
.tip-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.tip-ico{font-size:18px}
.tip-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:11px;letter-spacing:2px;color:#FF4D00;text-transform:uppercase}
.tip-body{font-size:13px;color:#f0f0f0;line-height:1.5}
.filter-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:8px;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.filter-label{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:9px;letter-spacing:2px;color:#555;text-transform:uppercase;margin-bottom:6px}
.fchip{flex-shrink:0;padding:7px 13px;border-radius:20px;border:1px solid #1e1e1e;background:#111;color:#888;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;-webkit-tap-highlight-color:transparent;white-space:nowrap;transition:all .15s}
.fchip.on{background:#FF4D00;border-color:#FF4D00;color:#fff}
.rec-card{background:#111;border-radius:14px;padding:14px;margin-bottom:10px;border:1px solid #1e1e1e;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .12s}
.rec-card:active{transform:scale(.98)}
.rec-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:17px;text-transform:uppercase;line-height:1.1;margin-bottom:6px}
.rec-badges{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.rec-badge{font-size:9px;font-weight:700;padding:3px 7px;border-radius:3px;background:#1a1a1a;color:#888;border:1px solid #1e1e1e;letter-spacing:.5px;text-transform:uppercase}
.rec-badge.obj{background:rgba(255,77,0,.1);color:#FF4D00;border-color:rgba(255,77,0,.25)}
.rec-meta{display:flex;gap:12px;font-size:11px;color:#555}
.rec-meta span{display:flex;align-items:center;gap:3px}
.nutri-disclaimer{font-size:10px;color:#444;text-align:center;padding:16px 8px 4px;line-height:1.5}
/* Modal receta pantalla completa */
.rec-modal{display:none;position:fixed;inset:0;background:#080808;z-index:550;flex-direction:column}
.rec-modal.show{display:flex}
.rec-modal-hdr{padding:14px 18px;display:flex;align-items:center;gap:14px;border-bottom:1px solid #1e1e1e;background:#0c0c0c;flex-shrink:0}
.rec-modal-back{background:transparent;border:none;color:#f0f0f0;font-size:22px;cursor:pointer;padding:4px 8px}
.rec-modal-ttl{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:15px;text-transform:uppercase;letter-spacing:1px;line-height:1.1;flex:1}
.rec-modal-body{flex:1;overflow-y:auto;padding:20px 20px 40px;max-width:430px;width:100%;margin:0 auto}
.rec-modal-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:26px;text-transform:uppercase;line-height:1;margin-bottom:10px}
.rec-modal-badges{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.rec-modal-meta{display:flex;gap:18px;padding:14px;background:#111;border-radius:12px;border:1px solid #1e1e1e;margin-bottom:20px}
.rec-modal-meta-item{flex:1;text-align:center}
.rec-modal-meta-val{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;color:#FF4D00;line-height:1}
.rec-modal-meta-lbl{font-size:9px;color:#555;margin-top:3px;text-transform:uppercase;letter-spacing:1px}
.rec-section-ttl{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:3px;color:#555;text-transform:uppercase;margin:18px 0 10px}
.rec-ing-list{background:#111;border-radius:12px;padding:4px 14px;border:1px solid #1e1e1e}
.rec-ing{padding:10px 0;border-bottom:1px dashed #1e1e1e;font-size:13px;color:#f0f0f0;display:flex;gap:10px;align-items:flex-start}
.rec-ing:last-child{border-bottom:none}
.rec-ing-dot{color:#FF4D00;flex-shrink:0;margin-top:2px}
.rec-prep-list{counter-reset:step}
.rec-prep{background:#111;border-radius:12px;padding:14px;border:1px solid #1e1e1e;margin-bottom:8px;display:flex;gap:12px;counter-increment:step;position:relative}
.rec-prep::before{content:counter(step);font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;color:#FF4D00;min-width:28px;line-height:1}
.rec-prep-txt{font-size:13px;color:#f0f0f0;line-height:1.55;flex:1}
.rec-tip-garde{background:linear-gradient(135deg,rgba(255,77,0,.15),rgba(255,77,0,.04));border:1px solid rgba(255,77,0,.3);border-left:3px solid #FF4D00;border-radius:14px;padding:16px;margin-top:20px}
.rec-tip-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.rec-tip-ttl{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:12px;letter-spacing:2px;color:#FF4D00;text-transform:uppercase}
.rec-tip-body{font-size:13px;color:#f0f0f0;line-height:1.55}
</style>
</head>
<body>

<div class="page active" id="page-login">
  <div class="login-wrap">
    <div class="login-logo"><span>Garde</span> Method</div>
    <div class="login-sub">Mi Entrenamiento</div>
    <div class="login-card">
      <div class="login-title">Ingresar</div>
      <label class="flbl">Email</label>
      <input class="inp" type="email" id="l-email" placeholder="tu@email.com" autocomplete="email"/>
      <label class="flbl">Contraseña</label>
      <input class="inp" type="password" id="l-pass" placeholder="••••••••" autocomplete="current-password"/>
      <div class="err" id="l-err"></div>
      <button class="btn-fire" id="l-btn">Ingresar</button>
      <button id="resend-verification" style="display:none;width:100%;margin-top:8px;padding:12px;border-radius:12px;border:1px solid #1e1e1e;background:#1a1a1a;color:#FF4D00;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;letter-spacing:1px;cursor:pointer" onclick="resendVerification()">Reenviar email de verificación</button>
    </div>
  </div>
</div>

<div class="page" id="page-app">
  <div class="hdr">
    <div class="logo"><span>Garde</span> Method</div>
    <button class="role-tag" id="logout-btn">Salir</button>
  </div>

  <div id="tab-hoy" class="scroll">
    <div id="hoy-content"><div class="loading">Cargando...</div></div>
  </div>

  <div id="tab-musculos" style="display:none;flex:1;overflow-y:auto;padding:18px 20px 90px">
    <div class="slbl2" style="margin-bottom:14px">Músculos de hoy</div>
    <div style="display:flex;gap:12px;justify-content:center;margin-bottom:20px">

const auth = firebase.auth();

const MUSCLES = ["Pecho","Espalda","Hombros","Bíceps","Tríceps","Piernas","Glúteos","Core","Cardio"];
const MONTHS = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];

let currentTab = 'hoy';

let weights = {};

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}

async function resendVerification() {
  const email = document.getElementById('l-email').value.trim();
  const pass = document.getElementById('l-pass').value;
  try {
    const cred = await auth.signInWithEmailAndPassword(email, pass);
    await cred.user.sendEmailVerification();
    await auth.signOut();
    document.getElementById('l-err').textContent = 'Email reenviado. Revisá tu bandeja de entrada.';
    document.getElementById('resend-verification').style.display = 'none';
  } catch(e) {}
}

auth.onAuthStateChanged(user => {
  if (user) {
    myUid = user.uid;
    loadMyData(user.uid);
    loadChecks(user.uid);
    loadWeights(user.uid);
    showPage('page-app');
    document.getElementById('float-timer-btn').style.display = 'block';
  } else {
    myUid = null;
    checked = {};
    showPage('page-login');
  }
});

document.getElementById('l-btn').onclick = async () => {
  const email = document.getElementById('l-email').value.trim();
  const pass = document.getElementById('l-pass').value;
  const errEl = document.getElementById('l-err');
  errEl.textContent = '';
  if (!email || !pass) { errEl.textContent = 'Completá email y contraseña'; return; }
  document.getElementById('l-btn').textContent = 'Ingresando...';
  try {
    await auth.signInWithEmailAndPassword(email, pass);
    document.getElementById('l-btn').textContent = 'Ingresar';
  } catch(e) {
    errEl.textContent = 'Email o contraseña incorrectos';
    document.getElementById('l-btn').textContent = 'Ingresar';
  }
};

document.getElementById('l-pass').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('l-btn').click();
});

document.getElementById('logout-btn').onclick = () => auth.signOut();

async function markMyAttendance() {
  if (!myUid || !myData) return;
  const todayStr = todayKey();
  if (myData.lastAttendance === todayStr) return;
  const yesterday = new Date();
  yesterday.setDate(yesterday.getDate() - 1);
  const yesterdayStr = `${yesterday.getFullYear()}-${yesterday.getMonth()+1}-${yesterday.getDate()}`;
  const currentStreak = myData.lastAttendance === yesterdayStr ? (myData.streak || 0) + 1 : 1;
  const maxStreak = Math.max(currentStreak, myData.maxStreak || 0);
  const attendanceDays = myData.attendanceDays || [];
  if (!attendanceDays.includes(todayStr)) attendanceDays.push(todayStr);
  await db.collection('students').doc(myUid).update({
    attendance: (myData.attendance || 0) + 1,
    totalSessions: (myData.totalSessions || 0) + 1,
    lastAttendance: todayStr,
    streak: currentStreak,
    maxStreak: maxStreak,
    attendanceDays: attendanceDays
  });
}

function loadMyData(uid) {
  db.collection('students').doc(uid).onSnapshot(snap => {
    if (!snap.exists) return;
    myData = { id: snap.id, ...snap.data() };
    loadRoutines(uid);
    renderProgreso();
    checkAchievements(myData);
    checkPaymentAlert(myData);
    checkWeeklyReport(myData);
  });
}

function loadRoutines(uid) {
  db.collection('students').doc(uid).collection('routines').onSnapshot(snap => {
    myRoutines = snap.docs.map(d => ({ id: d.id, ...d.data() })).filter(r => r.status !== 'archived');
    if (!selectedRoutineId && myRoutines.length > 0) selectedRoutineId = myRoutines[0].id;
    if (selectedRoutineId && !myRoutines.find(r => r.id === selectedRoutineId)) {
      selectedRoutineId = myRoutines.length > 0 ? myRoutines[0].id : null;
    }
    renderHoy();
    renderMusculos();
    renderWeekList();
  });
}

function renderHoy() {
  if (!myData) return;
  const el = document.getElementById('hoy-content');
  const todayStr = todayKey();
  const attendedToday = myData.lastAttendance === todayStr;
  const streak = myData.streak || 0;
  const maxStreak = myData.maxStreak || 0;

  const streakHtml = streak > 0 ? `
    <div style="background:#111;border-radius:14px;padding:14px 16px;margin-bottom:14px;border:1px solid #1e1e1e;display:flex;align-items:center;justify-content:space-between">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="font-size:28px">${streak >= 7 ? '🔥' : streak >= 3 ? '⚡' : '💪'}</div>
        <div>
          <div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;line-height:1">${streak} día${streak===1?'':'s'} seguidos</div>
          <div style="font-size:11px;color:#555;margin-top:2px">Racha actual</div>
        </div>
      </div>
      <div style="text-align:right">
        <div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:18px;color:#FF4D00">${maxStreak}</div>
        <div style="font-size:10px;color:#555">Récord</div>
      </div>
    </div>` : '';

  const hasMsg = myData.coachMessage && myData.coachMessageExpiry && Date.now() < myData.coachMessageExpiry;
  // Generar key única del mensaje para trackear si ya lo vio
  const msgKey = hasMsg ? `seen_msg_${myUid}_${myData.coachMessageExpiry}` : '';
  const alreadySeen = hasMsg && localStorage.getItem(msgKey);
  const msgHtml = (hasMsg && !alreadySeen) ? `
    <div id="coach-msg-card" style="background:linear-gradient(135deg,rgba(255,77,0,.15),rgba(255,77,0,.05));border:1px solid rgba(255,77,0,.3);border-radius:14px;padding:16px;margin-bottom:14px;position:relative">

        visualNum++;
        html += `

        <div style="display:flex;align-items:center;gap:12px" onclick="toggleEx('${k}')">

function loadChecks(uid) {
  const key = todayKey();
  db.collection('students').doc(uid).collection('checks').doc(key).onSnapshot(snap => {
    if (snap.exists) { checked = snap.data().exercises || {}; }
    else { checked = {}; }
    renderHoy();
  });
}

function loadWeights(uid) {
  const key = todayKey();
  db.collection('students').doc(uid).collection('weights').doc(key).onSnapshot(snap => {
    if (snap.exists) {
      const todayW = snap.data().exercises || {};
      Object.keys(todayW).forEach(k => weights[k] = todayW[k]);
    }
    renderHoy();
  });
  db.collection('students').doc(uid).collection('weights')
    .orderBy('date', 'desc').limit(2).get().then(snap => {
      snap.docs.forEach((d, idx) => {
        if (idx > 0) {
          const prevW = d.data().exercises || {};
          Object.keys(prevW).forEach(k => weights[`prev-${k}`] = prevW[k]);
        }
      });
      renderHoy();
    }).catch(() => {});
}

async function saveWeight(k, val) {
  if (!myUid || !val) return;
  const key = todayKey();
  weights[k] = val;
  try {
    await db.collection('students').doc(myUid).collection('weights').doc(key).set({
      exercises: weights, date: key
    }, { merge: true });
  } catch(e) {}
}

function selectRoutine(id) { selectedRoutineId = id; renderHoy(); }

async function toggleEx(k) {
  checked[k] = !checked[k];
  renderHoy();
  if (myUid) {
    const key = todayKey();
    await db.collection('students').doc(myUid).collection('checks').doc(key).set({
      exercises: checked, date: key
    });
  }
}

async function toggleGroup(routineId, grupoId) {
  const r = myRoutines.find(x => x.id === routineId);
  if (!r) return;
  const exs = r.exercises || [];
  // Encontrar los índices de los ejercicios de este grupo
  const indices = [];
  exs.forEach((ex, i) => { if (ex.grupoId === grupoId) indices.push(i); });
  if (!indices.length) return;
  // Si todos están done, desmarcar todos. Si no, marcar todos.
  const allDone = indices.every(idx => checked[`${routineId}-${idx}`]);
  const newVal = !allDone;
  indices.forEach(idx => { checked[`${routineId}-${idx}`] = newVal; });
  renderHoy();
  if (myUid) {
    const key = todayKey();
    await db.collection('students').doc(myUid).collection('checks').doc(key).set({
      exercises: checked, date: key
    });
  }
}

// Sistema de sonido con Web Audio API (funciona offline, sin archivos externos)
let audioCtx = null;
function initAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e) { console.log('Audio no disponible'); }
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}
function playBeep(freq, duration, volume) {
  if (!audioCtx) return;
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.value = 0;
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    const now = audioCtx.currentTime;
    gain.gain.linearRampToValueAtTime(volume || 0.3, now + 0.01);
    gain.gain.linearRampToValueAtTime(0, now + duration);
    osc.start(now);
    osc.stop(now + duration);
  } catch(e) {}
}
function beepCountdown() { playBeep(800, 0.1, 0.25); }
function beepWorkStart() {
  playBeep(600, 0.12, 0.35);
  setTimeout(() => playBeep(900, 0.25, 0.4), 130);
}
function beepRestStart() { playBeep(300, 0.4, 0.35); }
function beepFinish() {
  playBeep(500, 0.15, 0.4);
  setTimeout(() => playBeep(700, 0.15, 0.4), 160);
  setTimeout(() => playBeep(1000, 0.4, 0.45), 320);
}

function startTabata(blockIndex) {
  const r = myRoutines.find(x => x.id === selectedRoutineId) || myRoutines[0];
  if (!r) return;
  const t = (r.tabataBlocks || [])[blockIndex];
  if (!t) return;
  initAudio(); // requerido por iOS/Chrome móvil tras interacción del usuario
  // Filtrar ejercicios vacíos (los slots en blanco no cuentan como estación)
  const stations = (t.exercises || []).filter(e => e && e.trim());
  if (!stations.length) { alert('Este Tabata no tiene ejercicios cargados'); return; }
  let currentRound = 1;
  let currentExIdx = 0;
  let isWork = true;
  let seconds = t.work;
  if (timerInterval) clearInterval(timerInterval);
  const overlay = document.getElementById('timer-overlay');
  const circle = document.getElementById('timer-circle');
  function updateDisplay() {
    document.getElementById('timer-num').textContent = seconds;
    document.getElementById('timer-label').textContent = isWork ? '🔥 TRABAJO' : '😮‍💨 DESCANSO';
    document.getElementById('timer-ex-name').textContent = stations[currentExIdx] || '';
    document.getElementById('timer-next-ex').textContent = `Ronda ${currentRound} de ${t.rounds}`;
    overlay.classList.remove('work','rest');
    circle.classList.remove('work','rest','warn');
    if (isWork) { overlay.classList.add('work'); circle.classList.add('work'); }
    else { overlay.classList.add('rest'); circle.classList.add('rest'); }
  }
  updateDisplay();
  overlay.classList.add('show');
  beepWorkStart();
  timerInterval = setInterval(() => {
    seconds--;
    document.getElementById('timer-num').textContent = seconds;
    // Beeps de aviso en los últimos 3 segundos
    if (seconds === 3 || seconds === 2 || seconds === 1) {
      beepCountdown();
      circle.classList.add('warn');
    } else {
      circle.classList.remove('warn');
    }
    if (seconds <= 0) {
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
      if (isWork) {
        // Termina el trabajo → pasa al descanso (sigue siendo la misma ronda)
        isWork = false;
        seconds = t.rest;
        beepRestStart();
        updateDisplay();
      } else {
        // Termina el descanso → pasa a la siguiente ronda
        currentRound++;
        if (currentRound > t.rounds) {
          // FIN del Tabata
          clearInterval(timerInterval);
          overlay.classList.remove('show','work','rest');
          circle.classList.remove('work','rest','warn');
          if (navigator.vibrate) navigator.vibrate([300, 100, 300, 100, 300]);
          beepFinish();
          return;
        }
        // Rotar a la siguiente estación (cíclico)
        currentExIdx = (currentExIdx + 1) % stations.length;
        isWork = true;
        seconds = t.work;
        beepWorkStart();
        updateDisplay();
      }
    }
  }, 1000);
}

function buildCalendar(attendanceDays) {
  const today = new Date();
  const year = today.getFullYear();
  const month = today.getMonth();
  const monthNames = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const dayNames = ['D','L','M','M','J','V','S'];
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const todayDate = today.getDate();

  let cal = `
    <div style="background:#111;border-radius:14px;padding:16px;margin-bottom:14px;border:1px solid #1e1e1e">
      <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:2px;color:#555;text-transform:uppercase;margin-bottom:12px">📅 ${monthNames[month]} ${year}</div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center;margin-bottom:8px">
        ${dayNames.map(d => `<div style="font-size:10px;color:#555;font-weight:600;padding:2px">${d}</div>`).join('')}
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center">`;

  for (let i = 0; i < firstDay; i++) cal += `<div></div>`;

  for (let d = 1; d <= daysInMonth; d++) {
    const dateKey = `${year}-${month+1}-${d}`;
    const trained = attendanceDays.includes(dateKey);
    const isToday = d === todayDate;
    let bg = 'transparent', color = '#555', border = 'none', fontWeight = '400';
    if (trained) { bg = '#FF4D00'; color = '#fff'; fontWeight = '700'; }
    if (isToday && !trained) { border = '1px solid #FF4D00'; color = '#FF4D00'; fontWeight = '700'; }
    cal += `<div style="padding:5px 2px;border-radius:6px;background:${bg};color:${color};font-size:12px;font-weight:${fontWeight};border:${border}">${d}</div>`;
  }
  cal += `</div></div>`;
  return cal;
}

function renderProgreso() {
  if (!myData) return;
  const history = myData.history || [];
  const att = myData.attendance || 0;
  const total = myData.totalSessions || 0;
  const pct = total > 0 ? Math.round(att/total*100) : 0;
  const attendanceDays = myData.attendanceDays || [];
  const calHtml = buildCalendar(attendanceDays);

  let payHtml = '';
  if (myData.paymentDue) {
    const today = new Date(); today.setHours(0,0,0,0);
    const due = new Date(myData.paymentDue); due.setHours(0,0,0,0);
    const diff = Math.round((due - today) / (1000*60*60*24));
    const formattedDue = `${due.getDate()}/${due.getMonth()+1}/${due.getFullYear()}`;
    let payColor = '#00E676', payMsg = `Al día — vence el ${formattedDue}`;
    if (diff < 0) { payColor = '#FF1744'; payMsg = `Vencido hace ${Math.abs(diff)} días — contactá a tu entrenador`; }
    else if (diff === 0) { payColor = '#FF4D00'; payMsg = `Vence HOY — contactá a tu entrenador`; }
    else if (diff <= 3) { payColor = '#FFD600'; payMsg = `Vence en ${diff} día${diff===1?'':'s'} — el ${formattedDue}`; }
    payHtml = `
      <div style="background:#111;border-radius:14px;padding:16px;margin-bottom:14px;border:1px solid #1e1e1e">
        <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:2px;color:#555;text-transform:uppercase;margin-bottom:8px">💳 Estado de pago</div>
        <div style="display:flex;align-items:center;gap:10px">
          <div style="font-size:28px">${diff < 0 ? '🔴' : diff <= 3 ? '🟡' : '🟢'}</div>
          <div style="font-size:13px;color:${payColor};font-weight:600">${payMsg}</div>
        </div>
      </div>`;
  }

  let chartHtml = '';
  if (history.length >= 2) {
    const ws = history.map(h => h.weight);
    const mn = Math.min(...ws) - .5, mx = Math.max(...ws) + .5;
    const norm = w => Math.max(6, ((w-mn)/(mx-mn))*100);

let achievementsQueue = [];
let showingAchievement = false;

async function checkAchievements(data) {
  if (!myUid || !data) return;
  try {
    const snap = await db.collection('students').doc(myUid).collection('achievements').doc('unlocked').get();
    const unlocked = snap.exists ? (snap.data().ids || []) : [];
    const newUnlocked = [];
    for (const ach of ACHIEVEMENTS) {
      if (!unlocked.includes(ach.id) && ach.check(data)) {
        newUnlocked.push(ach.id);
        achievementsQueue.push(ach);
      }
    }
    if (newUnlocked.length) {
      await db.collection('students').doc(myUid).collection('achievements').doc('unlocked').set({ ids: [...unlocked, ...newUnlocked] });
      showNextAchievement(data.name || '');
    }
  } catch(e) {}
}

function showNextAchievement(name) {
  if (showingAchievement || achievementsQueue.length === 0) return;
  const ach = achievementsQueue.shift();
  showingAchievement = true;

  document.getElementById('ach-title').textContent = ach.title;

  document.getElementById('achievement-overlay').classList.add('show');

  document.getElementById('achievement-overlay').classList.remove('show');

async function checkWeeklyReport(data) {
  if (!myUid) return;
  const today = new Date();
  if (today.getDay() !== 0) return;
  const weekKey = `week-${today.getFullYear()}-${Math.floor((today - new Date(today.getFullYear(), 0, 1)) / (7*24*60*60*1000))}`;
  try {
    const snap = await db.collection('students').doc(myUid).collection('achievements').doc('weekly').get();
    if (snap.exists && snap.data().lastWeek === weekKey) return;
    const att = data.attendance || 0;
    const streak = data.streak || 0;
    const maxStreak = data.maxStreak || 0;
    const name = data.name.split(' ')[0];
    let emoji = '📊', title = '¡Resumen semanal!', msg = '';
    if (streak >= 7) { emoji = '🔥'; title = '¡Semana perfecta!'; msg = `${name}, entrenaste todos los días esta semana. Solo el 3% de las personas mantiene esta constancia. ¡Sos élite!`; }
    else if (streak >= 5) { emoji = '⚡'; title = '¡Gran semana!'; msg = `${name}, entrenaste ${streak} días esta semana. Estás en el top 10% de constancia. ¡Seguí así!`; }
    else if (streak >= 3) { emoji = '💪'; title = '¡Buena semana!'; msg = `${name}, llevas ${streak} días seguidos entrenando. La mayoría de las personas no llega ni a 2. ¡Bien hecho!`; }
    else if (att >= 50) { emoji = '🏅'; title = '¡50 entrenamientos!'; msg = `${name}, acumulaste ${att} entrenamientos en total. Eso equivale a más de ${Math.round(att*1.2)} horas de trabajo duro. ¡Respeto!`; }
    else { emoji = '📅'; title = 'Nuevo comienzo'; msg = `${name}, cada semana es una nueva oportunidad. Esta semana podés empezar tu mejor racha. ¡Vos podés!`; }
    await db.collection('students').doc(myUid).collection('achievements').doc('weekly').set({ lastWeek: weekKey });
    setTimeout(() => { achievementsQueue.push({ emoji, title, msg: () => msg }); if (!showingAchievement) showNextAchievement(name); }, 3000);
  } catch(e) {}
}

let timerInterval = null;
let timerSeconds = 0;
let timerEndTime = 0;  // timestamp absoluto de cuándo termina (para sobrevivir al background)
let timerExName = '';
let timerNextExName = '';

function dismissCoachMsg(key) {
  if (!key) return;
  localStorage.setItem(key, '1');
  const card = document.getElementById('coach-msg-card');
  if (card) {
    card.style.transition = 'opacity .3s, transform .3s';
    card.style.opacity = '0';
    card.style.transform = 'translateX(20px)';
    setTimeout(() => card.remove(), 300);
  }
}

function startTimer(seconds, exName, nextExName) {
  if (timerInterval) clearInterval(timerInterval);
  timerSeconds = seconds;
  timerEndTime = Date.now() + (seconds * 1000); // timestamp absoluto de fin
  timerExName = exName || '';
  timerNextExName = nextExName || '';
  document.getElementById('timer-num').textContent = timerSeconds;
  document.getElementById('timer-ex-name').textContent = timerExName;
  document.getElementById('timer-next-ex').textContent = timerNextExName ? `Próximo: ${timerNextExName}` : '';
  document.getElementById('timer-circle').style.borderColor = '#FF4D00';
  document.getElementById('timer-label').textContent = 'Descanso';
  document.getElementById('timer-overlay').classList.add('show');
  timerInterval = setInterval(tickTimer, 250); // tick más rápido para mejor precisión al volver
}

function tickTimer() {
  // calcular segundos restantes a partir del timestamp de fin (sobrevive al background)
  const remaining = Math.max(0, Math.ceil((timerEndTime - Date.now()) / 1000));
  if (remaining !== timerSeconds) {
    timerSeconds = remaining;
    document.getElementById('timer-num').textContent = timerSeconds;
    if (timerSeconds <= 5 && timerSeconds > 0) {
      document.getElementById('timer-circle').style.borderColor = '#00E676';
    }
  }
  if (remaining <= 0) {
    clearInterval(timerInterval);
    timerInterval = null;
    document.getElementById('timer-overlay').classList.remove('show');
    if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
  }
}

// Recalcular el timer al volver al primer plano (cuando la pestaña/app vuelve a ser visible)
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && timerInterval) {
    tickTimer(); // recalcular inmediatamente al volver
  }
});

function stopTimer() { if (timerInterval) clearInterval(timerInterval); document.getElementById('timer-overlay').classList.remove('show'); }
document.getElementById('timer-skip-btn').addEventListener('click', stopTimer);
document.getElementById('timer-skip-btn').addEventListener('touchend', (e) => { e.preventDefault(); stopTimer(); });

function openTimerPicker() { document.getElementById('timer-picker').classList.add('show'); }
function closeTimerPicker() { document.getElementById('timer-picker').classList.remove('show'); }
function startTimerManual(seconds) { closeTimerPicker(); startTimer(seconds, '', ''); }

}

let filtroCategoria = 'todas';
let filtroMomento = 'todos';
let filtroObjetivo = 'todos';

function getTipDelDia() {
  const ahora = new Date();
  const inicioAño = new Date(ahora.getFullYear(), 0, 0);
  const diff = ahora - inicioAño;
  const dayOfYear = Math.floor(diff / (1000 * 60 * 60 * 24));
  return TIPS_DEL_DIA[dayOfYear % TIPS_DEL_DIA.length];
}

function labelMomento(m) {
  return ({desayuno:'Desayuno',almuerzo:'Almuerzo',merienda:'Merienda',cena:'Cena',snack:'Snack'})[m] || m;
}
function labelObjetivo(o) {
  return ({'pre-entreno':'Pre-entreno','post-entreno':'Post-entreno','general':'General'})[o] || o;
}
function labelCategoria(c) {
  return ({salado:'Salado',dulce:'Dulce'})[c] || c;
}

function recetasFiltradas() {
  return RECETAS.filter(r => {
    if (filtroCategoria !== 'todas' && r.categoria !== filtroCategoria) return false;
    if (filtroMomento !== 'todos' && r.momento !== filtroMomento) return false;
    if (filtroObjetivo !== 'todos' && r.objetivo !== filtroObjetivo) return false;
    return true;
  });
}

function renderNutricion() {
  const el = document.getElementById('nutricion-content');
  const tip = getTipDelDia();

  const tipHtml = `
    <div class="tip-card">
      <div class="tip-hdr">
        <span class="tip-ico">💡</span>
        <span class="tip-title">Tip del día</span>
      </div>
      <div class="tip-body">${tip}</div>
    </div>`;

  const fCat = ['todas','salado','dulce'];
  const fMom = ['todos','desayuno','almuerzo','merienda','cena','snack'];
  const fObj = ['todos','pre-entreno','post-entreno','general'];

  const filtrosHtml = `
    <div class="filter-label">Categoría</div>
    <div class="filter-row">
      ${fCat.map(c => `<button class="fchip ${filtroCategoria===c?'on':''}" onclick="setFiltro('cat','${c}')">${c==='todas'?'Todas':labelCategoria(c)}</button>`).join('')}
    </div>
    <div class="filter-label">Momento</div>
    <div class="filter-row">
      ${fMom.map(m => `<button class="fchip ${filtroMomento===m?'on':''}" onclick="setFiltro('mom','${m}')">${m==='todos'?'Todos':labelMomento(m)}</button>`).join('')}
    </div>
    <div class="filter-label">Objetivo</div>
    <div class="filter-row">
      ${fObj.map(o => `<button class="fchip ${filtroObjetivo===o?'on':''}" onclick="setFiltro('obj','${o}')">${o==='todos'?'Todos':labelObjetivo(o)}</button>`).join('')}
    </div>`;

  const recs = recetasFiltradas();
  const listHtml = recs.length === 0
    ? '<div class="empty"><div class="empty-icon">🍽️</div><div style="font-size:14px">Sin recetas con esos filtros</div><div style="font-size:12px;color:#555;margin-top:6px">Probá con otra combinación</div></div>'
    : recs.map(r => `
      <div class="rec-card" onclick="openReceta(${r.id})">
        <div class="rec-title">${r.titulo}</div>
        <div class="rec-badges">
          <span class="rec-badge">${labelCategoria(r.categoria)}</span>
          <span class="rec-badge">${labelMomento(r.momento)}</span>
          <span class="rec-badge obj">${labelObjetivo(r.objetivo)}</span>
        </div>
        <div class="rec-meta">
          <span>⏱ ${r.tiempoMin} min</span>
          <span>🔥 ~${r.calorias} kcal</span>
        </div>
      </div>`).join('');

  el.innerHTML = `
    <div class="slbl2">Nutrición</div>
    ${tipHtml}
    ${filtrosHtml}
    <div style="margin-top:14px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:2px;color:#555;text-transform:uppercase;margin-bottom:10px">${recs.length} receta${recs.length===1?'':'s'}</div>
    ${listHtml}
    <div class="nutri-disclaimer">Contenido educativo general. Para un plan personalizado consultá con un Lic. en Nutrición.</div>
  `;
}

function setFiltro(tipo, valor) {
  if (tipo === 'cat') filtroCategoria = valor;
  if (tipo === 'mom') filtroMomento = valor;
  if (tipo === 'obj') filtroObjetivo = valor;
  renderNutricion();
}

function openReceta(id) {
  const r = RECETAS.find(x => x.id === id);
  if (!r) return;
  document.getElementById('rec-modal-ttl').textContent = r.titulo;
  document.getElementById('rec-modal-body').innerHTML = `
    <div class="rec-modal-title">${r.titulo}</div>
    <div class="rec-modal-badges">
      <span class="rec-badge">${labelCategoria(r.categoria)}</span>
      <span class="rec-badge">${labelMomento(r.momento)}</span>
      <span class="rec-badge obj">${labelObjetivo(r.objetivo)}</span>
    </div>
    <div class="rec-modal-meta">
      <div class="rec-modal-meta-item">
        <div class="rec-modal-meta-val">${r.tiempoMin}</div>
        <div class="rec-modal-meta-lbl">Minutos</div>
      </div>
      <div class="rec-modal-meta-item">
        <div class="rec-modal-meta-val">~${r.calorias}</div>
        <div class="rec-modal-meta-lbl">Kcal / porción</div>
      </div>
    </div>
    <div class="rec-section-ttl">Ingredientes</div>
    <div class="rec-ing-list">
      ${r.ingredientes.map(i => `<div class="rec-ing"><span class="rec-ing-dot">●</span><span>${i}</span></div>`).join('')}
    </div>
    <div class="rec-section-ttl">Preparación</div>
    <div class="rec-prep-list">
      ${r.preparacion.map(p => `<div class="rec-prep"><div class="rec-prep-txt">${p}</div></div>`).join('')}
    </div>
    <div class="rec-tip-garde">
      <div class="rec-tip-hdr">
        <span style="font-size:18px">💪</span>
        <span class="rec-tip-ttl">Tip Garde</span>
      </div>
      <div class="rec-tip-body">${r.tipGarde}</div>
    </div>
    <div class="nutri-disclaimer">Contenido educativo general. Para un plan personalizado consultá con un Lic. en Nutrición.</div>
  `;
  document.getElementById('rec-modal').classList.add('show');
  document.getElementById('rec-modal-body').scrollTop = 0;
}

function closeReceta() {
  document.getElementById('rec-modal').classList.remove('show');
}
</script>
